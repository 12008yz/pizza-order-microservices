# Render Blueprint — frontend + admin (Next.js в Docker)
# Документация: https://render.com/docs/blueprint-spec
services:
  - type: web
    runtime: docker
    name: tariff-frontend
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: free
    region: frankfurt
    autoDeployTrigger: commit

  - type: web
    runtime: docker
    name: tariff-admin
    dockerfilePath: admin/Dockerfile
    dockerContext: admin
    plan: free
    region: frankfurt
    autoDeployTrigger: commit
